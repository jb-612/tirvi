acm_nodes:
  specs:
    - id: spec:N01/F49/DE-01
      name: ProgressReporter protocol
      description: >
        Thin callback Protocol injected into run_pipeline().
        Methods: stage_started, stage_completed, stage_error, token_tick, summarize.
      feature_refs: [N01/F49-pipeline-progress]
      status: designed

    - id: spec:N01/F49/DE-02
      name: RichProgressReporter
      description: >
        rich-based concrete implementation with TTY detection at construction.
        Falls back to plain logging.INFO on non-TTY or ImportError.
      feature_refs: [N01/F49-pipeline-progress]
      status: designed

    - id: spec:N01/F49/DE-03
      name: Pipeline stage instrumentation
      description: >
        run_pipeline() wraps each stage with stage_started/stage_completed.
        Cascade progress via EventListener on CorrectionCascadeService.
      feature_refs: [N01/F49-pipeline-progress]
      status: designed

    - id: spec:N01/F49/DE-04
      name: Summary table
      description: >
        summarize() renders a table sorted descending by elapsed_s.
        TTY: rich.table.Table. Non-TTY: TSV with Total footer.
      feature_refs: [N01/F49-pipeline-progress]
      status: designed

    - id: spec:N01/F49/DE-05
      name: PipelineReport value object
      description: >
        frozen dataclass PipelineReport(stages: tuple[StageTiming, ...]).
        StageTiming(name, elapsed_s, metric_label, errored). Returned from run_pipeline().
      feature_refs: [N01/F49-pipeline-progress]
      status: designed

