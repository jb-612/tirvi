# Ontology delta — N04/F35 Word-sync highlight (vanilla HTML POC)
# Owner: werbeH-design branch
# Target: ontology/technical-implementation.yaml (merged serially by team-lead)
#
# Schema: matches ontology/schemas/technical-implementation.schema.yaml plus
#   the "tasks" section convention used by the master file.
# Idempotency: nodes are additive; lead deduplicates on `id` during merge.
# F35 is a frontend JS feature — no Python classes or adapter ports.

version: 1
feature_id: N04/F35

# Modules — coarse-grained code groupings.
modules:
  - id: MOD-N04-F35
    name: player.word_sync_highlight
    description: vanilla-HTML POC player — loads audio timings + page bbox JSON, drives a requestAnimationFrame highlight loop, and positions a CSS marker over the currently-spoken word; pure browser JS, no framework
    feature_refs: [N04/F35]
    bounded_context: audio_delivery
    source_path: player/
    status: implementing   # T-01, T-02, T-03 done; T-04..T-06 designed

# Services — runtime processes.
services: []

# Ports — abstract interfaces.
ports: []

# Adapters — concrete vendor implementations.
adapters: []

# Classes — none; F35 is function + class module, described under functions.
classes: []

# Functions — top-level callable entry points contributed by F35.
functions:
  - id: FN-N04-F35-initPlayer
    name: initPlayer
    description: async entry point; fetches audio.json + page.json, populates Player.state, attaches play/pause listeners that arm/disarm the rAF loop; degrades gracefully when audio.json is missing (banner) but fails loud on missing page.json
    feature_refs: [N04/F35]
    bounded_context: audio_delivery
    module_ref: MOD-N04-F35
    source_path: player/js/player.js
    status: implementing   # covered by T-01 (scaffold done), T-02 (loader done)

  - id: FN-N04-F35-startHighlightLoop
    name: startHighlightLoop
    description: arms requestAnimationFrame loop on <audio> play event; each frame calls lookupWord then positionMarker; cancels loop on pause; honours prefers-reduced-motion by suppressing CSS transitions
    feature_refs: [N04/F35]
    bounded_context: audio_delivery
    module_ref: MOD-N04-F35
    source_path: player/js/player.js
    status: implementing   # T-03 done

  - id: FN-N04-F35-moveMarker
    name: moveMarker
    description: positionMarker(bbox, image_natural, image_rendered) — scales bbox pixel coords from natural image resolution to rendered size (retina-safe); sets CSS top/left/width/height on .marker element
    feature_refs: [N04/F35]
    bounded_context: audio_delivery
    module_ref: MOD-N04-F35
    source_path: player/js/highlight.js
    status: designed   # T-05 not yet started

  - id: FN-N04-F35-loadTimingsAndPage
    name: loadTimingsAndPage
    description: async fetch of audio.json and page.json; validates against docs/schemas/audio.schema.json and docs/schemas/page.schema.json; caches parsed result in Player.state; emits error banner on partial failure
    feature_refs: [N04/F35]
    bounded_context: audio_delivery
    module_ref: MOD-N04-F35
    source_path: player/js/player.js
    status: implementing   # T-02 done

  - id: FN-N04-F35-lookupWord
    name: lookupWord
    description: lookupWord(timings, t_seconds) — binary search returning mark_id where timings[i].start_s <= t < timings[i].end_s; returns null when t is before first or after last entry
    feature_refs: [N04/F35]
    bounded_context: audio_delivery
    module_ref: MOD-N04-F35
    source_path: player/js/timing.js
    status: designed   # T-04 not yet started

# ADR decisions
adr_decisions:
  - id: adr:023
    name: Vanilla HTML/JS for POC player (deviates from HLD Next.js)
    description: POC speed-of-iteration; Next.js deferred to MVP. Influences all DEs.
    feature_refs: [N04/F35]
    bounded_context: audio_delivery
    source_path: docs/ADR/ADR-023-poc-vanilla-html-player.md
    status: proposed

