# Ontology delta — N04/F39 Pause-and-Jump Affordance
# Authored 2026-05-02 as Phase-0 design backfill (pre-implementation).
# Corrected 2026-05-02 to vanilla JS per ADR-023; Flutter/Riverpod
# language replaced. F39 ships under tirvi/player/js/ with vitest tests.

version: 1
feature_id: N04/F39

modules:
  - id: MOD-N04-F39-auto-pause-policy
    name: tirvi.player.auto_pause_policy
    description: |
      Vanilla ES module exposing `loadAutoPause`, `saveAutoPause`,
      and `STORAGE_KEY`. Synchronous read/write through a
      localStorage-shaped adapter. Default true (per Q4). Persists
      under `tirvi.player.auto_pause_after_question`.
    feature_refs: [N04/F39]
    bounded_context: player
    source_path: player/js/auto_pause_policy.js
    status: designed
  - id: MOD-N04-F39-question-index
    name: tirvi.player.question_index
    description: |
      Pure functions: `questionIndexFromBlocks(blocks)` and
      `advanceQuestion(blocks, currentMarkId, direction)`. Computes
      (current, total) of question_stem blocks and the mark_id of
      the next/prev question_stem on a J/K jump.
    feature_refs: [N04/F39]
    bounded_context: player
    source_path: player/js/question_index.js
    status: designed
  - id: MOD-N04-F39-controls-extension
    name: tirvi.player.controls.f39_extension
    description: |
      In-place extension of player/js/controls.js — adds J/K
      keybindings to `bindKeyboard` and a `block_end` event case
      that auto-pauses on question_stem when the policy is on.
      Not a separate file; conceptually ontology-delta still
      records the surface area introduced.
    feature_refs: [N04/F36, N04/F39]
    bounded_context: player
    source_path: player/js/controls.js
    status: designed
  - id: MOD-N04-F39-progress-hint
    name: tirvi.player.progress_hint
    description: |
      Vanilla DOM helper. `mountProgressHint(parent)` creates a
      <span aria-live="polite"> rendering "שאלה N מתוך M".
    feature_refs: [N04/F39]
    bounded_context: player
    source_path: player/js/progress_hint.js
    status: designed

services: []
ports: []
adapters: []

classes: []  # Vanilla JS — module-scoped functions, no class wrappers.

functions:
  - id: FN-N04-F39-load-auto-pause
    name: loadAutoPause
    description: |
      Reads STORAGE_KEY from a localStorage-shaped adapter; returns
      true on missing / unparseable / corrupted values. Pure aside
      from the storage read.
    feature_refs: [N04/F39]
    bounded_context: player
    module_ref: MOD-N04-F39-auto-pause-policy
    source_path: player/js/auto_pause_policy.js
    status: designed
  - id: FN-N04-F39-save-auto-pause
    name: saveAutoPause
    description: |
      Writes the boolean to the storage adapter as "true" / "false".
      Swallows quota / SecurityError; warns to console. Idempotent.
    feature_refs: [N04/F39]
    bounded_context: player
    module_ref: MOD-N04-F39-auto-pause-policy
    source_path: player/js/auto_pause_policy.js
    status: designed
  - id: FN-N04-F39-on-block-end
    name: onBlockEnd
    description: |
      Player state-machine handler. On block_end whose finished
      block_kind === "question_stem" AND loadAutoPause() is true,
      dispatch `pause`. Otherwise no-op.
    feature_refs: [N04/F36, N04/F39]
    bounded_context: player
    module_ref: MOD-N04-F39-controls-extension
    source_path: player/js/controls.js
    status: designed
  - id: FN-N04-F39-jump-next-question
    name: jumpToNextQuestion
    description: |
      Computes the mark_id of the next question_stem block via
      advanceQuestion and seeks audio.currentTime. Audio play/pause
      state is preserved (no state-machine event dispatched).
    feature_refs: [N04/F39]
    bounded_context: player
    module_ref: MOD-N04-F39-controls-extension
    source_path: player/js/controls.js
    status: designed
  - id: FN-N04-F39-jump-previous-question
    name: jumpToPreviousQuestion
    description: |
      Symmetric reverse of jumpToNextQuestion.
    feature_refs: [N04/F39]
    bounded_context: player
    module_ref: MOD-N04-F39-controls-extension
    source_path: player/js/controls.js
    status: designed

constants:
  - id: CONST-N04-F39-localstorage-key
    name: tirvi.player.auto_pause_after_question
    description: |
      localStorage key (string) for the auto-pause toggle.
      Reserved per F32 localStorage convention.
    feature_refs: [N04/F32, N04/F39]
    bounded_context: player
    source_path: player/js/auto_pause_policy.js
    status: designed

adr_decisions:
  - id: adr:041
    name: red-line decision register
    description: F39 entry — row #5 (auto-pause at question_stem end ALLOW; auto-pause is "extra time wired into the medium" rather than exam modification, aligning with MoE Level 1).
    feature_refs: [N04/F39]
    status: proposed
  - id: adr:023
    name: POC player ships as vanilla HTML; Next.js deferred to MVP
    description: F39 implementation honours ADR-023 — ships under tirvi/player/js/ with vitest, not Flutter/Riverpod.
    feature_refs: [N04/F35, N04/F36, N04/F39]
    status: proposed

