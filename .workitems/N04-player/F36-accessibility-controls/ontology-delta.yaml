# Ontology delta — N04/F36 Accessibility controls (4-button POC)
# Owner: werbeH-design branch
# Target: ontology/technical-implementation.yaml (merged serially by team-lead)
#
# Schema: matches ontology/schemas/technical-implementation.schema.yaml plus
#   the "tasks" section convention used by the master file.
# Idempotency: nodes are additive; lead deduplicates on `id` during merge.
# F36 is a frontend JS feature — no Python classes or adapter ports.

version: 1
feature_id: N04/F36

# Modules — coarse-grained code groupings.
modules:
  - id: MOD-N04-F36
    name: player.accessibility_controls
    description: vanilla-HTML POC control surface — 4-button play/pause/continue/reset panel, pure-function state machine, keyboard shortcut binding, ARIA labels, and WCAG-compliant focus styles; co-hosted on the same page as F35
    feature_refs: [N04/F36]
    bounded_context: audio_delivery
    source_path: player/
    status: implementing   # T-01 done; T-02..T-06 designed

# Services — runtime processes.
services: []

# Ports — abstract interfaces.
ports: []

# Adapters — concrete vendor implementations.
adapters: []

# Classes — none; state machine is a plain pure function.
classes: []

# Functions — top-level callable entry points contributed by F36.
functions:
  - id: FN-N04-F36-nextState
    name: nextState
    description: "pure function nextState(current: PlayerState, event: PlayerEvent) -> PlayerState; exhaustive state machine over idle/playing/paused/ended; invalid transitions return current state unchanged; no side effects"
    feature_refs: [N04/F36]
    bounded_context: audio_delivery
    module_ref: MOD-N04-F36
    source_path: player/js/controls.js
    status: designed   # T-02 not yet started

  - id: FN-N04-F36-bindButtons
    name: bindButtons
    description: "Controls.bind(audio): attaches click listeners to the 4 buttons; each click dispatches the matching PlayerEvent, derives side-effect (play/pause/reset), and calls renderButtons(state)"
    feature_refs: [N04/F36]
    bounded_context: audio_delivery
    module_ref: MOD-N04-F36
    source_path: player/js/controls.js
    status: designed   # T-03 not yet started

  - id: FN-N04-F36-announceState
    name: announceState
    description: "renderButtons(state): flips button.disabled per state table (idle->Play only; playing->Pause only; paused->Continue+Reset; ended->Play+Reset); called after every state transition to keep DOM in sync"
    feature_refs: [N04/F36]
    bounded_context: audio_delivery
    module_ref: MOD-N04-F36
    source_path: player/js/controls.js
    status: designed   # T-04 not yet started

  - id: FN-N04-F36-bindKeyboard
    name: bindKeyboard
    description: "bindKeyboard(controls): Space -> play/pause toggle based on current state; R -> always reset; both call event.preventDefault to suppress page scroll and browser default behaviours"
    feature_refs: [N04/F36]
    bounded_context: audio_delivery
    module_ref: MOD-N04-F36
    source_path: player/js/keymap.js
    status: designed   # T-05 not yet started

# ADR decisions
adr_decisions:
  - id: adr:023
    name: Vanilla HTML/JS for POC player (deviates from HLD Next.js)
    description: Existing ADR covering F35 + F36 shared stack decision.
    feature_refs: [N04/F36]
    bounded_context: audio_delivery
    source_path: docs/ADR/ADR-023-poc-vanilla-html-player.md
    status: proposed

