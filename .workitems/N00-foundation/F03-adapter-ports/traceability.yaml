            - WordTimingResult
            - WordTiming
          errors:
            - WordTimingFallbackError
          invariants:
            - "INV-WT-001 (FT-014): WordTiming start_s <= end_s when both present"
            - "INV-WT-002 (post-review C2, F30 DE-05): end_s may be None for tail tokens"
            - "INV-WTR-001 (FT-014): timings count matches transcript_tokens unless tts_marks_truncated"
            - "INV-WTR-002 (BT-012): source records which adapter produced the result"
            - "INV-PORT-WT-001 (FT-014, BT-012): WordTimingProvider returns WordTimingResult"
            - "INV-COORD-001 (FT-014): primary→fallback on schema mismatch"
            - "INV-COORD-002 (FT-014): 3-predicate check — non-empty, count match, monotonic"
            - "INV-COORD-003 (BT-012): both-fail raises WordTimingFallbackError (typed, not silent)"
            - "INV-COORD-004 (ADR-015): timing_source metric emitted on every call"
