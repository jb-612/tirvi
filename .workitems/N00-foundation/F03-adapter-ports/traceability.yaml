            - NLPToken
            - DiacritizationResult
            - G2PResult
            - TTSResult
            - WordMark
          errors:
            - AdapterError
            - SchemaContractError
            - MarkCountMismatchError
          invariants:
            - "INV-OCR-001 (FT-011, BT-009): OCRResult never bytes"
            - "INV-OCR-002 (biz S01): confidence None, never 0.0"
            - "INV-OCR-W-001 (FT-011): OCRWord bbox is post-deskew pixel coords"
            - "INV-OCR-W-002 (FT-011): OCRWord conf in [0,1] or None"
            - "INV-MARK-001 (FT-012): WordMark start_ms <= end_ms"
            - "INV-MARK-002 (FT-014): WordMark mark_id matches PlanToken.id (F22)"
            - "INV-TTS-001 (FT-012, BT-009): TTSResult never bytes"
            - "INV-TTS-002 (FT-013): word_marks=None is legitimate (mark-less providers)"
            - "INV-TTS-003 (post-review C8, F30 DE-02): audio_duration_s=None is legitimate"
            - "INV-CONTRACT-001 (BT-009): contract rejects bytes return"
            - "INV-CONTRACT-002 (FT-016): contract asserts every required field"
            - "INV-CONTRACT-003 (BT-011): contract catches schema drift after port evolution"
            - "INV-PORT-OCR-001 (FT-011, BT-009): OCRBackend returns OCRResult"
            - "INV-PORT-NLP-001 (FT-011): NLPBackend returns NLPResult with Hebrew UD tokens (F17)"
            - "INV-PORT-DIA-001 (FT-011): DiacritizerBackend returns DiacritizationResult with NFC→NFD nikud (F19)"
            - "INV-PORT-G2P-001 (FT-011): G2PBackend returns G2PResult with IPA/SAMPA per F20"
            - "INV-PORT-TTS-001 (FT-012, BT-009): TTSBackend returns TTSResult"
            - "INV-PORT-TTS-002 (FT-013): TTSBackend.word_marks=None legitimate"
        ports:
          interfaces:
            - OCRBackend
            - NLPBackend
            - DiacritizerBackend
            - G2PBackend
            - TTSBackend
        fakes:
          - OCRBackendFake
          - NLPBackendFake
          - DiacritizerBackendFake
          - G2PBackendFake
          - TTSBackendFake
        contract_harness:
          - assert_adapter_contract
        lint_rules:
          - "ruff flake8-tidy-imports.banned-api: google.cloud, transformers, torch, huggingface_hub blocked outside tirvi/adapters/** (DE-06)"
        tests:
          unit:
