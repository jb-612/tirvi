    name: analyze_via_yap
    description: POSTs Hebrew text to YAP /api/v0/joint; returns parsed JSON with lattice_md and lattice_ma.
    feature_refs: [N02/F26]
    bounded_context: hebrew_nlp
    module_ref: MOD-N02-F26
    source_path: tirvi/adapters/alephbert/client.py
    status: designed
  - id: FN-N02-F26-yap-to-nlpresult
    name: yap_to_nlpresult
    description: Walks lattice_md; maps CPOSTag to UD-Hebrew; produces NLPResult with locked NLPToken schema.
    feature_refs: [N02/F26]
    bounded_context: hebrew_nlp
    module_ref: MOD-N02-F26
    source_path: tirvi/adapters/alephbert/mapper.py
    status: designed

