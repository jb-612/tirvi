# Bounded-context block (DDD-7L precursor)
bounded_contexts:
  hebrew_text:
    features:
      CorrectionCascade:
        feature_id: N02/F48
        scope_specs: [DE-01, DE-02, DE-03, DE-04, DE-05, DE-07, DE-08]
        user_stories: [F48-S01, F48-S02, F48-S03, F48-S05, F48-S06]
        acceptance_criteria:
          - F48-S01/AC-01
          - F48-S01/AC-02
          - F48-S02/AC-01
          - F48-S02/AC-02
          - F48-S02/AC-03
          - F48-S03/AC-01
          - F48-S03/AC-02
          - F48-S03/AC-03
          - F48-S05/AC-01
          - F48-S05/AC-02
          - F48-S05/AC-03
          - F48-S05/AC-04
          - F48-S06/AC-01
          - F48-S06/AC-02
          - F48-S06/AC-03
          - F48-S06/AC-04
        domain_layer:
          aggregates: [CorrectionCascade]
          value_objects:
            - CorrectionVerdict
            - MLMSubstitutionCandidate
            - ConfusionPair
            - StageDecision
            - LLMReviewVerdict
            - LLMPromptTemplate
            - RuleSuggestion
            - CascadeMode
          domain_events:
            - CorrectionApplied
            - CorrectionRejected
            - CascadeModeDegraded
          errors:
            - ConfusionTableMissing
            - CascadeConfigInvalid
            - LLMParseFailure
            - LLMWordListViolation
          invariants:
            - "INV-CCS-001 (DE-05): token-in / token-out — never split or merge tokens (DEP-052/053)"
            - "INV-CCS-002 (DE-04): chosen ∈ candidates ∧ chosen ∈ NakdanWordList (anti-hallucination)"
            - "INV-CCS-003 (DE-06): every corrected token has a CorrectionLogEntry (audit hard rule)"
            - "INV-CCS-004 (DE-04): privacy — outbound DNS resolves only to 127.0.0.1 / ::1 during cascade"
            - "INV-CCS-005 (DE-07): mode is fixed per-page once selected (no mid-page mode flip)"
            - "INV-CCS-006 (DE-08): per-sha contribution to support_count is capped at 1 (anti-spam)"
        ports:
          implements: []
          defined: [ICascadeStage, NakdanWordListPort, LLMClientPort, FeedbackReadPort]
        adapters:
          - OllamaLLMClient            # tirvi/correction/adapters/ollama.py
          - SqliteFeedbackReader       # tirvi/correction/adapters/feedback_sqlite.py
          - DictaBertLoaderAdapter     # reuse F17 loader
        tests:
          unit:
            - tests/unit/test_correction_ports.py
            - tests/unit/test_nakdan_gate.py
            - tests/unit/test_mlm_scorer.py
            - tests/unit/test_llm_reviewer.py
            - tests/unit/test_cascade_service.py
            - tests/unit/test_correction_log.py
            - tests/unit/test_health_probe.py
            - tests/unit/test_feedback_aggregator.py
            - tests/unit/test_pipeline.py
            - tests/unit/test_privacy_invariant.py
  privacy_compliance:
    features:
      CorrectionLog:
        feature_id: N02/F48
        scope_specs: [DE-06]
        user_stories: [F48-S04]
        acceptance_criteria:
          - F48-S04/AC-01
          - F48-S04/AC-02
          - F48-S04/AC-03
