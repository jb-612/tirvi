dependencies_delta:
  - id: DEP-052
    source: { type: feature, id: N02/F48, name: Hebrew correction cascade }
    target: { type: feature, id: N02/F19, name: Dicta-Nakdan adapter }
    relationship: triggers
    rationale: F48 produces the corrected token stream that F19 diacritizes. Token-in / token-out invariant must hold (regression of UAT F-3 marker drift).
    strength: strong
    direction: one_way
    risk_if_broken: marker drift recurrence; word-sync UX regresses.
    related_files:
      - path: docs/ADR/ADR-033-hebrew-correction-cascade.md
      - path: .workitems/N02-hebrew-interpretation/F48-correction-cascade/functional-test-plan.md
  - id: DEP-053
    source: { type: feature, id: N02/F48, name: Hebrew correction cascade }
    target: { type: feature, id: N02/F22, name: Reading-plan output }
    relationship: requires
    rationale: F48 must preserve token boundaries so plan-stage marks remain 1:1 with OCR words.
    strength: strong
    direction: one_way
    risk_if_broken: highlight desync.
    related_files:
      - path: .workitems/N02-hebrew-interpretation/F48-correction-cascade/functional-test-plan.md
  - id: DEP-054
    source: { type: feature, id: N02/F48, name: Hebrew correction cascade }
    target: { type: feature, id: N05/F47, name: Feedback capture }
    relationship: requires
    rationale: F48 feedback loop reads/writes the same sqlite F47 owns; schema-compatible extension.
    strength: medium
    direction: bidirectional
    risk_if_broken: feedback loss; rule promotion blocked.
    related_files:
      - path: .workitems/N02-hebrew-interpretation/F48-correction-cascade/user_stories.feedback-loop.md
  - id: DEP-055
    source: { type: feature, id: N02/F48, name: Hebrew correction cascade }
    target: { type: feature, id: F50, name: Inspector (under design) }
    relationship: validates
    rationale: F48 produces corrections.json consumed by F50; F48 holds schema contract.
    strength: strong
    direction: one_way
    risk_if_broken: inspector cannot render reasoning trail.
    related_files:
      - path: .workitems/N02-hebrew-interpretation/F48-correction-cascade/user_stories.correction-log.md
  - id: DEP-056
    source: { type: feature, id: N02/F48, name: Hebrew correction cascade }
    target: { type: feature, id: N05/F40, name: Quality gates CI }
    relationship: validates
    rationale: F40 measures the recall and precision SLOs that F48 ships scaffolding for.
    strength: medium
    direction: one_way
    risk_if_broken: quality target unmeasurable.
    related_files:
      - path: docs/ADR/ADR-033-hebrew-correction-cascade.md
  - id: DEP-057
    source: { type: feature, id: N02/F14, name: Normalization pass }
    target: { type: feature, id: N02/F48, name: Hebrew correction cascade }
    relationship: requires
    rationale: F14 strips wrap chars / ordinals / slash suffixes BEFORE F48; otherwise F48 inherits UAT F-9 / F-6 regressions.
    strength: strong
    direction: one_way
    risk_if_broken: cascade operates on dirty tokens; precision drops.
    related_files:
      - path: docs/UAT/UAT-2026-05-01-tts-quality.md
  - id: DEP-058
    source: { type: feature, id: N02/F48, name: Hebrew correction cascade }
    target: { type: feature, id: N02/F21, name: Homograph overrides }
    relationship: triggers
    rationale: Promoted rule suggestions land in F21 lexicon (one promotion target).
    strength: medium
    direction: one_way
    risk_if_broken: rule promotion has no destination.
    related_files:
      - path: .workitems/N02-hebrew-interpretation/F48-correction-cascade/user_stories.feedback-loop.md
  - id: DEP-059
    source: { type: business_object, id: BO49, name: CorrectionCascade }
    target: { type: business_object, id: BO52, name: StageDecision }
    relationship: uses_object
    rationale: Cascade aggregates StageDecisions per token per stage.
    strength: strong
    direction: one_way
    risk_if_broken: lost reasoning trail.
    related_files:
      - path: .workitems/N02-hebrew-interpretation/F48-correction-cascade/user_stories.md
  - id: DEP-060
    source: { type: business_object, id: BO49, name: CorrectionCascade }
    target: { type: domain_event, id: BO57, name: CorrectionApplied }
    relationship: emits
    rationale: Successful auto_apply or LLM-confirmed apply emits this event.
    strength: strong
    direction: one_way
    risk_if_broken: downstream observability blind to corrections.
    related_files:
      - path: .workitems/N02-hebrew-interpretation/F48-correction-cascade/user_stories.md

