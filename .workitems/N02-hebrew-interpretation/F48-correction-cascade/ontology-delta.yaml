# -----------------------------------------------------------------------------
# To be appended to ontology/business-domains.yaml
# -----------------------------------------------------------------------------
business_domains_delta:
  personas:
    - id: P15
      name: Pipeline Engineer
      role: tirvi internal — tunes thresholds, prompts, model versions; reads correction logs; reviews rule promotion suggestions
      collaboration_level: solo

  business_objects:
    - id: BO49
      name: CorrectionCascade
      type: aggregate_root
      description: per-page transient aggregate orchestrating NakdanGate to DictaBERTMLMScorer to LLMReviewer; accumulates StageDecision rows; emits CorrectionLogEntry on close
      owned_by_context: hebrew_text
      related_features: [N02/F48]
    - id: BO50
      name: MLMSubstitutionCandidate
      type: value_object
      description: (text, score, in_word_list); ranked output of confusion-table substitution scoring
      owned_by_context: hebrew_text
      related_features: [N02/F48]
    - id: BO51
      name: ConfusionPair
      type: value_object
      description: (a, b, source_writer); loaded from confusion_pairs.yaml; data-driven not code-driven
      owned_by_context: hebrew_text
      related_features: [N02/F48]
    - id: BO52
      name: StageDecision
      type: value_object
      description: (stage, verdict, mode, scores?, candidates?, llm_response?); recorded per token per stage
      owned_by_context: hebrew_text
      related_features: [N02/F48]
    - id: BO53
      name: LLMReviewVerdict
      type: value_object
      description: (model_id, prompt_template_version, verdict, chosen, reason, latency_ms, cache_key); parsed Ollama response
      owned_by_context: hebrew_text
      related_features: [N02/F48]
    - id: BO54
      name: LLMPromptTemplate
      type: value_object
      description: (version, body, language=he); versioned prompt asset
      owned_by_context: hebrew_text
      related_features: [N02/F48]
    - id: BO55
      name: CorrectionLogEntry
      type: value_object
      description: row in drafts/<sha>/corrections.json — full reasoning trail per corrected token
      owned_by_context: hebrew_text
      related_features: [N02/F48]
    - id: BO56
      name: RuleSuggestion
      type: value_object
      description: aggregator output (pattern, support_count, distinct_shas, sample_contexts); engineer-gated promotion
      owned_by_context: hebrew_text
      related_features: [N02/F48]
    - id: BO57
      name: CorrectionApplied
      type: domain_event
      description: emitted when a stage commits a correction (auto_apply or apply)
      owned_by_context: hebrew_text
      related_features: [N02/F48]
    - id: BO58
      name: CorrectionRejected
      type: domain_event
      description: emitted on hallucination reject, threshold miss, or user override
      owned_by_context: hebrew_text
      related_features: [N02/F48]
    - id: BO59
      name: CascadeModeDegraded
      type: domain_event
      description: emitted on init when health probe fails; carries mode value
      owned_by_context: hebrew_text
      related_features: [N02/F48]

  collaboration_objects:
    - id: CO13
      name: NakdanWordList
      type: system
      responsibilities:
        - in-process word-list lookup (fnotfromwl); first-stage gate
      interacts_with: [CO03]
    - id: CO14
      name: DictaBERTMLMScorer
      type: system
      responsibilities:
        - mask-and-score candidate substitutions in sentence context
      interacts_with: [CO02]
    - id: CO15
      name: LLMReviewer
      type: external_party
      responsibilities:
        - on-device semantic / grammatical review of ambiguous tokens via Ollama
      interacts_with: []
    - id: CO16
      name: FeedbackAggregator
      type: system
      responsibilities:
        - read drafts/feedback.db; emit rule_suggestions.json; per-sha cap; threshold-gated
      interacts_with: []

  assumptions:
    - id: ASM11
      description: Local Ollama runtime (gemma3:27b or :4b) is available on the M4 Max. Offline mode covers absence.
      source: ADR-033 Decision row 3, Consequences
      confidence: high
      validation_needed: false
    - id: ASM12
      description: 90 percent recall target is aspirational pending F39 bench + F40 quality-gates measurement; F48 ships the recall test scaffold but does not own SLO measurement.
      source: spec quality requirements + global review F48-R1-2
      confidence: medium
      validation_needed: true
    - id: ASM13
      description: Confusion pairs are data, not code. New pairs land via YAML edit (F48-S05 / BT-214), not module changes.
      source: ADR-033 Consequences (generalizes)
      confidence: high
      validation_needed: false

