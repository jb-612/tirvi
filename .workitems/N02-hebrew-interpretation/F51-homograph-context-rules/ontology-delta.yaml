    feature_refs: [N02/F48, N02/F51]
    spec_refs: [spec:N02/F51/DE-03]
    test_path: tests/unit/test_he_homograph_judge_template.py
    status: implemented
  - id: task:N02/F51/T-04
    name: regression-fixture-corpus
    feature_refs: [N02/F51]
