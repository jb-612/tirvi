    bounded_context: pronunciation
    source_path: tirvi/adapters/nakdan/
    status: designed

services: []
ports: []

adapters:
  - id: ADP-N02-F19-nakdan
    name: DictaNakdanAdapter
    description: >
      DiacritizerBackend implementation wrapping Dicta REST API. Selection
      priority: sep > homograph-override > options-empty > fconfident-gate >
      top option. NLP-context scoring (DE-02) gated on F17 morph output.
      Per ADR-025 (REST for POC) and ADR-029 (vendor boundary).
    feature_refs: [N02/F19]
    bounded_context: pronunciation
    port_ref: PORT-03
    source_path: tirvi/adapters/nakdan/adapter.py
    status: designed

classes: []

functions:
  - id: FN-N02-F19-diacritize-via-api
    name: diacritize_via_api
    description: POSTs text to Dicta REST endpoint; stdlib urllib.request; 30s timeout; returns raw JSON list.
    feature_refs: [N02/F19]
    bounded_context: pronunciation
    module_ref: MOD-N02-F19
    source_path: tirvi/adapters/nakdan/client.py
    status: designed
  - id: FN-N02-F19-pick
    name: _pick
    description: >
      Diacritization selection priority chain for one Dicta entry.
      CC ≤ 3 after refactor (extract _passthrough, _override_hit, _confidence_gated helpers).
    feature_refs: [N02/F19]
    bounded_context: pronunciation
    module_ref: MOD-N02-F19
    source_path: tirvi/adapters/nakdan/inference.py
    status: designed
  - id: FN-N02-F19-to-nfd
    name: to_nfd
    description: NFC→NFD normalization of diacritized output; required by downstream Phonikud (F20).
    feature_refs: [N02/F19]
    bounded_context: pronunciation
    module_ref: MOD-N02-F19
    source_path: tirvi/adapters/nakdan/normalize.py
    status: designed

