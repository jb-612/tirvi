# Cross-feature edges to add to ontology/dependencies.yaml on merge
# (REALIZES sw->biz, CONSUMES sw->sw).
new_dependency_edges:
  - {from: feature:N02/F15, to: feature:N02/F14, type: CONSUMES, rationale: "F14 emits NormalizedText; F15 walks its spans"}
  - {from: feature:N02/F17, to: feature:N02/F15, type: CONSUMES, rationale: "DictaBERT operates on the text field of ExpandedText, not raw NormalizedText"}
  - {from: feature:N02/F22, to: feature:N02/F15, type: CONSUMES, rationale: "ReadingPlan stamps original_form + lexicon_version per token"}
  - {from: feature:N02/F23, to: feature:N02/F15, type: CONSUMES, rationale: "SSML reads spell_out flag for per-letter break"}
  - {from: feature:N02/F15, to: bo:Lexicon, type: REALIZES}
  - {from: feature:N02/F15, to: bo:AcronymEntry, type: REALIZES}
