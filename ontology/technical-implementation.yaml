    source_path: tirvi/acronym/lint.py
    status: designed
  - id: MOD-N02-F16
    name: tirvi.lang_spans
    description: 'Pure-Python mixed-language run detector. Emits LanguageSpan[]
    
      (start, end, lang ∈ {he, en, num}, confidence) from normalized
    
