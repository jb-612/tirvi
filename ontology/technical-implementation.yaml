# Functions — explicit cross-references (most auto-discovered).
  - id: CLS-N02-F14-NormalizedText
    name: NormalizedText
    description: frozen value object — text + spans tuple + repair_log tuple; output of the normalize stage; consumed by F17 / F22 / F35
    feature_refs:
    - N02/F14
    bounded_context: hebrew_nlp
    module_ref: MOD-N02-F14
    source_path: tirvi/normalize/results.py
    status: designed
  - id: CLS-N02-F14-Span
    name: Span
    description: frozen value object — char_start, char_end, src_word_indices (tuple of ints); preserves bbox→text provenance
    feature_refs:
    - N02/F14
    bounded_context: hebrew_nlp
    module_ref: MOD-N02-F14
    source_path: tirvi/normalize/results.py
    status: designed
  - id: CLS-N02-F14-RepairLogEntry
    name: RepairLogEntry
    description: frozen value object — rule_id, span, before, after; emitted by every applied repair rule for downstream auditing (BT-066)
    feature_refs:
    - N02/F14
    bounded_context: hebrew_nlp
    module_ref: MOD-N02-F14
    source_path: tirvi/normalize/diff.py
    status: designed
  - id: CLS-N02-F15-Lexicon
    name: Lexicon
    description: aggregate root — versioned, immutable collection of AcronymEntry; built once from YAML at module load via mtime cache.
    feature_refs:
    - N02/F15
    module_ref: MOD-N02-F15
    source_path: tirvi/acronym/lexicon.py
    status: designed
  - id: CLS-N02-F15-AcronymEntry
    name: AcronymEntry
    description: value object — (form, expansion, source, context_tags). context_tags reserved for MVP domain-aware disambiguation; v1 ignores.
    feature_refs:
    - N02/F15
    module_ref: MOD-N02-F15
    source_path: tirvi/acronym/lexicon.py
    status: designed
  - id: CLS-N02-F15-ExpandedText
    name: ExpandedText
    description: value object — extends F14 NormalizedText shape with expansion_log + lexicon_version stamp; consumed by F17 / F22 / F23.
    feature_refs:
    - N02/F15
    module_ref: MOD-N02-F15
    source_path: tirvi/acronym/results.py
    status: designed
  - id: CLS-N02-F15-ExpansionLogEntry
    name: ExpansionLogEntry
    description: value object — per-token provenance (original_form, expansion, src_word_indices, spell_out flag); enables player feedback affordance and SSML per-letter routing.
    feature_refs:
    - N02/F15
    module_ref: MOD-N02-F15
    source_path: tirvi/acronym/results.py
    status: designed
  - id: CLS-N02-F16-result
    name: LanguageSpansResult
    description: 'Frozen dataclass: spans (tuple[LanguageSpan, ...]) + provider
    
      ("tirvi-rules-v1") + aggregate confidence. Reuses biz
    
      bo:LanguageSpan value object.
    
      '
    feature_refs:
    - N02/F16
    module_ref: MOD-N02-F16
    source_path: tirvi/lang_spans/results.py
    status: designed
  - id: CLS-N02-F18-NLPToken
    name: NLPToken
    description: 'Per-token value object enforced by F18 v1 invariants — pos (UD-Hebrew), lemma str|None (POC tolerates None per ADR-026), morph_features dict[str,str]|None (UD v2 TitleCase whitelist: Gender,
      Number, Person, Tense, Definite, Case, VerbForm), prefix_segments tuple|None, confidence float|None (range 0.0..1.0 when not None), ambiguous bool.'
    feature_refs:
    - N02/F18
    module_ref: MOD-03
    source_path: tirvi/results.py
    status: designed
  - id: CLS-N02-F18-MorphHomographOverride
    name: MorphHomographOverride
    description: Lookup type for MORPH_HOMOGRAPH_OVERRIDES. Key is (surface, frozenset((token.morph_features or {}).items())) — note the `(x or {}).items()` Python idiom; NOT `x.items() or ()` which raises
      AttributeError on None (R2 A-2). Value is an NLPToken to substitute when F17 marks ambiguous=True. POC ships an empty mapping.
    feature_refs:
    - N02/F18
    - N02/F21
    module_ref: MOD-N02-F18-overrides
    source_path: tirvi/nlp/overrides.py
    status: designed
  - id: CLS-N02-F48-CorrectionCascade
    name: CorrectionCascade
    description: per-page transient aggregate root (BO49); accumulates StageDecisions, emits domain events, never persisted across pages
    feature_refs: [N02/F48]
    module_ref: MOD-N02-F48
    source_path: tirvi/correction/aggregate.py
    status: designed
  - id: CLS-N02-F48-CorrectionVerdict
    name: CorrectionVerdict
    description: frozen value object — (stage, verdict, original, corrected_or_none, score?, candidates?, mode, cache_hit, reason?, model_versions?)
    feature_refs: [N02/F48]
    module_ref: MOD-N02-F48
    source_path: tirvi/correction/value_objects.py
    status: designed
  - id: CLS-N02-F48-StageDecision
    name: StageDecision
    description: BO52 — recorded per token per stage; embedded in CorrectionLogEntry
    feature_refs: [N02/F48]
