# Technical Implementation Ontology — tirvi
# Project-level graph slice for the SOFTWARE LAYER. Owned by @sw-designpipeline.
# Schema: ontology/schemas/technical-implementation.schema.yaml
#
# Populated incrementally as @sw-designpipeline runs per-feature design and
# task breakdown. Each task records its target module/class as a node here;
# each ADR authored gets an `adr-decision` node.

version: 1

