# Ports — abstract interfaces.
ports:
  - id: PORT-01
    name: OCRBackend
    description: extracts Hebrew text + layout from PDF bytes; returns OCRResult
    feature_refs: [N00/F03]
    bounded_context: extraction
    source_path: tirvi/ports.py
    status: designed
  - id: PORT-02
    name: NLPBackend
    description: tokenize + POS-tag + lemmatize Hebrew text; returns NLPResult
    feature_refs: [N00/F03]
    bounded_context: hebrew_nlp
    source_path: tirvi/ports.py
    status: designed
  - id: PORT-03
    name: DiacritizerBackend
    description: add ניקוד to undecorated Hebrew tokens; returns DiacritizationResult
    feature_refs: [N00/F03]
    bounded_context: pronunciation
    source_path: tirvi/ports.py
    status: designed
  - id: PORT-04
    name: G2PBackend
    description: emit IPA + stress for diacritized tokens; returns G2PResult
    feature_refs: [N00/F03]
    bounded_context: pronunciation
    source_path: tirvi/ports.py
    status: designed
  - id: PORT-05
    name: TTSBackend
    description: synthesize audio from SSML; returns TTSResult with optional word_marks
    feature_refs: [N00/F03]
    bounded_context: speech_synthesis
    source_path: tirvi/ports.py
    status: designed
  - id: PORT-06
    name: WordTimingProvider
    description: per-word timing from TTS marks or forced alignment; returns WordTimingResult
    feature_refs: [N00/F03]
    bounded_context: audio_delivery
    source_path: tirvi/ports.py
    status: designed
  - id: PORT-N02-F48-CASCADE-STAGE
    name: ICascadeStage
    description: single-method port `evaluate(token, context) -> CorrectionVerdict`; realised by NakdanGate, DictaBertMLMScorer, OllamaLLMReviewer
    feature_refs: [N02/F48]
    bounded_context: hebrew_text
    source_path: tirvi/correction/ports.py
    status: designed
  - id: PORT-N02-F48-WORDLIST
    name: NakdanWordListPort
    description: in-process Hebrew word-list lookup (`is_known_word(token) -> bool`); collaborator CO13
    feature_refs: [N02/F48]
    bounded_context: hebrew_text
    source_path: tirvi/correction/ports.py
    status: designed
  - id: PORT-N02-F48-LLM
    name: LLMClientPort
    description: transport-only LLM port (`generate(prompt, model_id, temperature, seed) -> str`); concrete impl POSTs to Ollama at 127.0.0.1
    feature_refs: [N02/F48]
    bounded_context: hebrew_text
    source_path: tirvi/correction/ports.py
    status: designed
  - id: PORT-N02-F48-FEEDBACK
    name: FeedbackReadPort
    description: read user-rejection rows from drafts/feedback.db; cascade reads at init to revert corrections per BT-211
    feature_refs: [N02/F48]
    bounded_context: hebrew_text
    source_path: tirvi/correction/ports.py
    status: designed

