# Technical Implementation Ontology — tirvi
# Project-level graph slice for the SOFTWARE LAYER. Owned by @sw-designpipeline.
# Schema: ontology/schemas/technical-implementation.schema.yaml
#
# Populated incrementally as @sw-designpipeline runs per-feature design and
# task breakdown. Each task records its target module/class as a node here;
# each ADR authored gets an `adr-decision` node.

version: 1

# Modules — coarse-grained code groupings.
modules:
  - id: MOD-01
    name: tirvi
    description: top-level Python package — pipeline domain code, ports, results, fakes
    feature_refs: [N00/F03]
    bounded_context: platform
    source_path: tirvi/
    status: designed
  - id: MOD-02
    name: tirvi.ports
    description: hexagonal port Protocols (vendor-agnostic interfaces)
    feature_refs: [N00/F03]
    bounded_context: platform
    source_path: tirvi/ports.py
    status: designed
  - id: MOD-03
    name: tirvi.results
    description: rich result-object value types (frozen dataclasses)
    feature_refs: [N00/F03]
    bounded_context: platform
    source_path: tirvi/results.py
    status: designed
  - id: MOD-04
    name: tirvi.fakes
    description: in-memory deterministic fake adapters (test doubles)
    feature_refs: [N00/F03]
    bounded_context: platform
    source_path: tirvi/fakes/
    status: designed
  - id: MOD-05
    name: tirvi.contracts
    description: shared adapter contract test harness
    feature_refs: [N00/F03]
    bounded_context: platform
    source_path: tirvi/contracts.py
    status: designed
  - id: MOD-N01-F08
    name: tirvi.adapters.tesseract
    description: Tesseract OCR adapter package (invoker, deskew, layout post-processor)
    feature_refs: [N01/F08]
    bounded_context: extraction
    source_path: tirvi/adapters/tesseract/
    status: designed

# Services — runtime processes (none introduced by F03).
services: []

# Ports — abstract interfaces.
ports:
  - id: PORT-01
    name: OCRBackend
    description: extracts Hebrew text + layout from PDF bytes; returns OCRResult
    feature_refs: [N00/F03]
    bounded_context: extraction
    source_path: tirvi/ports.py
    status: designed
  - id: PORT-02
    name: NLPBackend
    description: tokenize + POS-tag + lemmatize Hebrew text; returns NLPResult
    feature_refs: [N00/F03]
    bounded_context: hebrew_nlp
    source_path: tirvi/ports.py
    status: designed
  - id: PORT-03
    name: DiacritizerBackend
    description: add ניקוד to undecorated Hebrew tokens; returns DiacritizationResult
    feature_refs: [N00/F03]
    bounded_context: pronunciation
    source_path: tirvi/ports.py
    status: designed
  - id: PORT-04
    name: G2PBackend
    description: emit IPA + stress for diacritized tokens; returns G2PResult
    feature_refs: [N00/F03]
    bounded_context: pronunciation
    source_path: tirvi/ports.py
    status: designed
  - id: PORT-05
    name: TTSBackend
    description: synthesize audio from SSML; returns TTSResult with optional word_marks
    feature_refs: [N00/F03]
    bounded_context: speech_synthesis
    source_path: tirvi/ports.py
    status: designed
  - id: PORT-06
    name: WordTimingProvider
    description: per-word timing from TTS marks or forced alignment; returns WordTimingResult
    feature_refs: [N00/F03]
    bounded_context: audio_delivery
    source_path: tirvi/ports.py
    status: designed

# Adapters — concrete implementations (fakes only in F03).
adapters:
  - id: ADP-01
    name: OCRBackendFake
    description: in-memory deterministic OCR fake (fixture-driven)
    feature_refs: [N00/F03]
    bounded_context: extraction
    port_ref: PORT-01
    source_path: tirvi/fakes/ocr.py
    status: designed
  - id: ADP-02
    name: NLPBackendFake
    description: in-memory deterministic NLP fake (fixture-driven)
    feature_refs: [N00/F03]
    bounded_context: hebrew_nlp
    port_ref: PORT-02
    source_path: tirvi/fakes/nlp.py
    status: designed
  - id: ADP-03
    name: DiacritizerBackendFake
    description: in-memory deterministic diacritizer fake (fixture-driven)
    feature_refs: [N00/F03]
    bounded_context: pronunciation
    port_ref: PORT-03
    source_path: tirvi/fakes/diacritizer.py
    status: designed
  - id: ADP-04
    name: G2PBackendFake
    description: in-memory deterministic G2P fake (fixture-driven)
    feature_refs: [N00/F03]
    bounded_context: pronunciation
    port_ref: PORT-04
    source_path: tirvi/fakes/g2p.py
    status: designed
  - id: ADP-05
    name: TTSBackendFake
    description: in-memory deterministic TTS fake (fixture-driven, marks present + absent variants)
    feature_refs: [N00/F03]
    bounded_context: speech_synthesis
    port_ref: PORT-05
    source_path: tirvi/fakes/tts.py
    status: designed
  - id: ADP-06
    name: WordTimingProviderFake
    description: in-memory fake exercising both tts-marks and forced-alignment paths
    feature_refs: [N00/F03]
    bounded_context: audio_delivery
    port_ref: PORT-06
    source_path: tirvi/fakes/word_timing.py
    status: designed
  # --- N01/F08 ---
  - id: ADP-N01-F08-tesseract
    name: TesseractOCRAdapter
    description: Tesseract heb adapter (tessdata_best, layout post-processor, optional deskew)
    feature_refs: [N01/F08]
    bounded_context: extraction
    port_ref: PORT-01
    source_path: tirvi/adapters/tesseract/__init__.py
    status: designed

# Classes / structs — result-object value types.
classes:
  - id: CLS-01
    name: OCRResult
    description: per-page bboxes + words + conf + lang_hints + provider
    feature_refs: [N00/F03]
    module_ref: MOD-03
    source_path: tirvi/results.py
    status: designed
  - id: CLS-02
    name: NLPResult
    description: per-token POS + lemma + morph + provider
    feature_refs: [N00/F03]
    module_ref: MOD-03
    source_path: tirvi/results.py
    status: designed
  - id: CLS-03
    name: DiacritizationResult
    description: vocalized form + confidence + provider
    feature_refs: [N00/F03]
    module_ref: MOD-03
    source_path: tirvi/results.py
    status: designed
  - id: CLS-04
    name: G2PResult
    description: IPA + stress + vocal-shva per token + provider
    feature_refs: [N00/F03]
    module_ref: MOD-03
    source_path: tirvi/results.py
    status: designed
  - id: CLS-05
    name: TTSResult
    description: audio bytes + codec + voice_meta + word_marks (optional) + provider
    feature_refs: [N00/F03]
    module_ref: MOD-03
    source_path: tirvi/results.py
    status: designed
  - id: CLS-06
    name: WordTimingResult
    description: per-word timing + source ∈ {tts-marks, forced-alignment} + provider
    feature_refs: [N00/F03]
    module_ref: MOD-03
    source_path: tirvi/results.py
    status: designed

# Functions — explicit cross-references (most auto-discovered).
functions:
  - id: FN-01
    name: assert_adapter_contract
    description: shared contract test harness; asserts adapter conforms to port + returns rich result
    feature_refs: [N00/F03]
    module_ref: MOD-05
    source_path: tirvi/contracts.py
    status: designed

# ADR decisions — first-class graph nodes.
adr_decisions:
  - id: adr:013
    name: SDLC harness — biz / sw design split + ACM ingestion
    description: Two-skill design model + repo-root ontology + ACM ingestion via existing CLI
    feature_refs: []  # harness-wide
    bounded_context: sdlc
    source_path: docs/ADR/ADR-013-sdlc-biz-sw-design-split.md
    status: proposed
  - id: adr:014
    name: Result-object schema versioning — contract tests over numeric versions
    description: Frozen dataclasses pinned by shared contract test; no schema_version field
    feature_refs: [N00/F03]
    bounded_context: platform
    source_path: docs/ADR/ADR-014-platform-result-schema-versioning.md
    status: proposed
  - id: adr:015
    name: WordTimingProvider fallback policy — automatic on schema mismatch
    description: Provider auto-falls-back to forced alignment on missing/truncated marks; env-var opt-out
    feature_refs: [N00/F03, N03/F30, N03/F31]
    bounded_context: audio_delivery
    source_path: docs/ADR/ADR-015-audio-word-timing-fallback-policy.md
    status: proposed
  - id: adr:016
    name: Tesseract deskew preprocessor lives inside the adapter
    description: Skew measured in-adapter; rotation applied when angle ≥ 5°; opt-out via env var
    feature_refs: [N01/F08]
    bounded_context: ingest
    source_path: docs/ADR/ADR-016-ingest-tesseract-deskew-location.md
    status: proposed

