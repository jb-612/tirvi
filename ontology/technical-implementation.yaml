# ADR decisions — first-class graph nodes.
adr_decisions:
  - id: adr:013
    name: SDLC harness — biz / sw design split + ACM ingestion
    description: Two-skill design model + repo-root ontology + ACM ingestion via existing CLI
    feature_refs: []  # harness-wide
    bounded_context: sdlc
    source_path: docs/ADR/ADR-013-sdlc-biz-sw-design-split.md
    status: proposed
  - id: adr:014
    name: Result-object schema versioning — contract tests over numeric versions
    description: Frozen dataclasses pinned by shared contract test; no schema_version field
    feature_refs: [N00/F03]
    bounded_context: platform
    source_path: docs/ADR/ADR-014-platform-result-schema-versioning.md
    status: proposed
  - id: adr:015
    name: WordTimingProvider fallback policy — automatic on schema mismatch
    description: Provider auto-falls-back to forced alignment on missing/truncated marks; env-var opt-out
    feature_refs: [N00/F03, N03/F30, N03/F31]
    bounded_context: audio_delivery
    source_path: docs/ADR/ADR-015-audio-word-timing-fallback-policy.md
    status: proposed
  - id: adr:016
    name: Tesseract deskew preprocessor lives inside the adapter
    description: Skew measured in-adapter; rotation applied when angle ≥ 5°; opt-out via env var
    feature_refs: [N01/F08]
    bounded_context: ingest
    source_path: docs/ADR/ADR-016-ingest-tesseract-deskew-location.md
    status: proposed
  - id: adr:017
    name: OCRResult fixture builder uses YAML, not a Python DSL
    description: YAML templates loaded by OCRResultBuilder.from_yaml; lives under tests/fixtures/ocr/
    feature_refs: [N01/F10]
    bounded_context: platform
    source_path: docs/ADR/ADR-017-platform-ocr-fixture-builder-format.md
    status: proposed
  - id: adr:018
    name: Block segmentation uses heuristics for POC; learned model deferred
    description: Heuristic classifier over OCRResult; 3 POC block types; learned upgrade deferred to N05
    feature_refs: [N01/F11]
    bounded_context: ingest
    source_path: docs/ADR/ADR-018-ingest-block-segmentation-heuristic.md
    status: proposed
  - id: adr:019
    name: Normalization uses deterministic rules for POC; ML repair deferred
    description: 2-rule deterministic normalizer; ML denoiser deferred to MVP
    feature_refs: [N02/F14]
    bounded_context: hebrew-interpretation
    source_path: docs/ADR/ADR-019-hebrew-nlp-normalization-rule-strategy.md
    status: proposed
  - id: adr:020
    name: DictaBERT loaded in-process for POC; sidecar deferred to MVP
    description: In-process module-level cache; sidecar topology behind same NLPBackend port at MVP
    feature_refs: [N02/F17]
    bounded_context: hebrew-interpretation
    source_path: docs/ADR/ADR-020-hebrew-nlp-dictabert-loading-topology.md
    status: proposed
  - id: adr:021
    name: Dicta-Nakdan loaded in-process for POC; API path deferred
    description: Local model load via lru_cache; hosted API behind same DiacritizerBackend port at MVP
    feature_refs: [N02/F19]
    bounded_context: pronunciation
    source_path: docs/ADR/ADR-021-pronunciation-nakdan-loading-topology.md
    status: proposed
  - id: adr:022
    name: Phonikud loaded in-process for POC; matching ADR-020/021 pattern
    description: Lazy in-process Phonikud import + lru_cache; sidecar deferred behind same G2PBackend port
    feature_refs: [N02/F20]
    bounded_context: pronunciation
    source_path: docs/ADR/ADR-022-pronunciation-phonikud-loading-topology.md
    status: proposed
  - id: adr:023
    name: POC player ships as vanilla HTML; Next.js deferred to MVP
    description: Static HTML + 3 small JS modules for the demo; HLD §3.1 Next.js stack lifts to MVP
    feature_refs: [N04/F35, N04/F36]
    bounded_context: player
    source_path: docs/ADR/ADR-023-player-vanilla-html-poc.md
    status: proposed

