# Schema for ontology/technical-implementation.yaml
# Validates structure of the software-layer graph slice.

$schema: technical-implementation
version: 1

required_top_level_keys:
  - version
  - modules
  - services
  - ports
  - adapters
  - classes
  - functions
  - adr_decisions

common_node_fields:
  required: [id, name, status]
  optional: [description, feature_refs, bounded_context, source_path]
  status_enum: [designed, implemented, retired]
  feature_refs_pattern: "^N[0-9]{2}-F[0-9]{2}"

node_types:

  module:
    id_pattern: "^module:[A-Za-z0-9._/-]+$"
    description: Coarse-grained code grouping (Go package, Dart feature)
    extends: common_node_fields

  service:
    id_pattern: "^service:[A-Za-z0-9._/-]+$"
    description: Runtime process — Cloud Run endpoint, worker, sidecar
    extends: common_node_fields

  port:
    id_pattern: "^port:[A-Za-z][A-Za-z0-9]+$"
    description: Abstract interface (DDD port, hex-arch boundary)
    extends: common_node_fields

  adapter:
    id_pattern: "^adapter:[A-Za-z][A-Za-z0-9]+$"
    description: Concrete implementation of a port
    extends: common_node_fields
    additional_required: [port_ref]

  class:
    id_pattern: "^class:[A-Za-z][A-Za-z0-9]+$"
    description: Cohesive type within a module
    extends: common_node_fields
    additional_required: [module_ref]

  function:
    id_pattern: "^fn:[A-Za-z][A-Za-z0-9]+$"
    description: Top-level callable; usually entry points or scheduled jobs
    extends: common_node_fields
    additional_required: [module_ref]

  adr_decision:
    id_pattern: "^adr:[0-9]{3}$"
    description: ADR — material design decision
    extends: common_node_fields
    status_enum: [proposed, accepted, superseded, deprecated]
    additional_required: [source_path]  # docs/ADR/ADR-NNN-*.md
