    description: "10-word sentence — no breaks expected"
    tokens:
      - {text: "המורה"}
      - {text: "כתבה"}
      - {text: "על"}
      - {text: "הלוח"}
      - {text: "את"}
      - {text: "השאלות"}
      - {text: "שהיו"}
      - {text: "במבחן"}
      - {text: "אתמול"}
      - {text: "בבוקר"}
    expected_fragments: 1
    expected_breaks: 0
  - id: U02
    description: "20-word sentence — at-threshold, no break"
    tokens: &twenty
      - {text: "פסקה"}
