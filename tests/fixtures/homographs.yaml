    notes: "UAT-2026-05-02 §S1 — genuinely two-valued sentence"
    focus_options: ["הָ|אֵם","הַאִם","הָ|אִם","הַ|אֵם","הָ|אֹם","הַ|אֶם","הַ|אֻם","הַ|אֹם"]

