# F51 T-04 — homograph regression fixture
#
# Each case is fed to `_project_with_context` with pre-baked Dicta-shape
# entries (the focus word's options are real Nakdan output captured by
# scripts/discover_homograph_cases.py). The integration test asserts on
# the resolved focus word.
#
# Per ADR-038, the test scope is the F51 RULE LAYER + Nakdan top-1
# fallback (no LLM judge in the loop) — kept deterministic + fast for CI.
# A separate slow test (with Ollama) exercises the full cascade.
#
# `must_contain_any` is matched after NFD normalisation so encoders that
# emit precomposed nikud also pass. Hebrew characters in must_contain_any
# include the prefix-stripped, fully-vocalized form for each gold reading.
schema_version: 1

cases:
  # ====== Original 6 bench cases ======
  - id: C01
    sentence: "האם הקריאה ספר לילדה"
